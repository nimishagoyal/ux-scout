<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>UX Scout — AI-powered UX intelligence</title>
<meta name="description" content="Turn UX questions into evidence-backed product decisions. UX Scout reads the competitive landscape, finds the patterns that hold, and writes recommendations tailored to your product." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,300..700&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: #14171C; color: #E8E3D2;
    font-family: 'Bricolage Grotesque', system-ui, sans-serif;
    font-variation-settings: 'opsz' 14, 'wdth' 100;
    scroll-behavior: smooth;
  }
  ::selection { background: rgba(217,150,62,0.4); color: #FBF3E2; }
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
    mix-blend-mode: overlay; opacity: .4;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(232,227,210,0.08); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(232,227,210,0.18); }
  @keyframes pulse { 0%, 100% { opacity: .55; transform: scale(1); } 50% { opacity: 1; transform: scale(1.10); } }
  @keyframes breath { 0%, 100% { opacity: .85; } 50% { opacity: 1; } }
  @keyframes fadeUp { 0% { opacity: 0; transform: translateY(16px); } 100% { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
  @keyframes slowdrift { 0% { transform: translate(0,0); } 50% { transform: translate(3px,-2px); } 100% { transform: translate(0,0); } }
  @keyframes orbitA { 0% { transform: translate(0,0); } 50% { transform: translate(14px,-10px); } 100% { transform: translate(0,0); } }
  @keyframes orbitB { 0% { transform: translate(0,0); } 50% { transform: translate(-12px,12px); } 100% { transform: translate(0,0); } }
  @keyframes orbitC { 0% { transform: translate(0,0); } 33% { transform: translate(22px,14px); } 66% { transform: translate(-8px,20px); } 100% { transform: translate(0,0); } }
  @keyframes orbitD { 0% { transform: translate(0,0); } 33% { transform: translate(-22px,-10px); } 66% { transform: translate(-8px,16px); } 100% { transform: translate(0,0); } }
  @keyframes orbitE { 0% { transform: translate(0,0); } 50% { transform: translate(18px,-16px); } 100% { transform: translate(0,0); } }
  @keyframes orbitF { 0% { transform: translate(0,0); } 50% { transform: translate(-20px,12px); } 100% { transform: translate(0,0); } }
  @keyframes fieldBreath { 0%, 100% { opacity: .9; transform: scale(1); } 50% { opacity: 1; transform: scale(1.04); } }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
  a { color: inherit; text-decoration: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="sequence-helpers.jsx"></script>
<script type="text/babel" src="app-components.jsx"></script>
<script type="text/babel" src="landing-galaxy.jsx"></script>
<script type="text/babel" src="landing-main.jsx"></script>
</body>
</html>
